# .readthedocs.yaml
# Read the Docs build configuration for welltest-pta.
# See https://docs.readthedocs.io/en/stable/config-file/v2.html

version: 2

build:
  os: ubuntu-22.04
  tools:
    python: "3.11"
  jobs:
    post_checkout:
      - git fetch --unshallow || true

# Build documentation with Sphinx
sphinx:
  configuration: docs/source/conf.py
  fail_on_warning: false

# Optionally also build PDF / EPUB
formats:
  - pdf
  - htmlzip

# Install the package itself + the docs extras
python:
  install:
    - method: pip
      path: .
      extra_requirements:
        - docs

# Search ranking
search:
  ranking:
    api/*: -1
    quickstart.html: 5
    detector.html: 4
    deconvolution.html: 4
