# .github/workflows/release.yml
# Build, test, and publish to PyPI when a version tag is pushed.
#
# Setup (one-off):
#   1. On PyPI: Project → Settings → Publishing → Add a trusted publisher
#         Owner:    geoharkat
#         Repo:     welltest-pta
#         Workflow: release.yml
#         Env:      pypi
#   2. On GitHub: Settings → Environments → New environment "pypi"
#         Optional: required reviewers, deployment branch protection
#   3. Tag a release with `git tag v0.1.0 && git push --tags`
#
# No PyPI API tokens needed — OIDC handles authentication.

name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  # ────────────────────────────────────────────────────────────────────
  # 1. Verify tag matches package version
  # ────────────────────────────────────────────────────────────────────
  verify:
    name: Verify version match
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.extract.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Extract package version
        id: extract
        run: |
          VERSION=$(python -c "import re,pathlib; \
            txt = pathlib.Path('src/welltest_pta/__version__.py').read_text(); \
            m = re.search(r'__version__\s*=\s*[\"\\\'](.*?)[\"\\\']', txt); \
            print(m.group(1))")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Package version: $VERSION"

      - name: Compare with git tag
        run: |
          TAG=${GITHUB_REF#refs/tags/v}
          PKG=${{ steps.extract.outputs.version }}
          echo "Tag = $TAG, Package = $PKG"
          if [ "$TAG" != "$PKG" ]; then
            echo "::error::Tag ($TAG) does not match package version ($PKG)"
            exit 1
          fi

  # ────────────────────────────────────────────────────────────────────
  # 2. Run full test suite one more time
  # ────────────────────────────────────────────────────────────────────
  test:
    name: Test before release
    needs: verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: pyproject.toml
      - run: pip install -e ".[dev]"
      - run: pytest -v

  # ────────────────────────────────────────────────────────────────────
  # 3. Build sdist + wheel
  # ────────────────────────────────────────────────────────────────────
  build:
    name: Build distribution
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build sdist + wheel
        run: |
          python -m pip install --upgrade pip build twine
          python -m build
          twine check dist/*

      - name: Show distribution contents
        run: ls -la dist/

      - name: Upload distribution artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 30

  # ────────────────────────────────────────────────────────────────────
  # 4. Publish to PyPI (trusted publishing — no token needed)
  # ────────────────────────────────────────────────────────────────────
  publish-pypi:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/welltest-pta
    permissions:
      id-token: write   # mandatory for OIDC trusted publishing

    steps:
      - name: Download distribution artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
          skip-existing: false
          verbose: true

  # ────────────────────────────────────────────────────────────────────
  # 5. Create a GitHub Release with the wheel + sdist attached
  # ────────────────────────────────────────────────────────────────────
  github-release:
    name: GitHub release
    needs: publish-pypi
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download distribution artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Extract changelog section
        id: changelog
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          # Pull the section between '## [VERSION]' and the next '## ['
          awk "/^## \\[$VERSION\\]/{flag=1; next} /^## \\[/{flag=0} flag" CHANGELOG.md > release_notes.md
          if [ ! -s release_notes.md ]; then
            echo "Release v$VERSION" > release_notes.md
          fi
          echo "Generated release_notes.md:"
          cat release_notes.md

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          name: "welltest-pta ${{ github.ref_name }}"
          body_path: release_notes.md
          files: |
            dist/*.whl
            dist/*.tar.gz
          generate_release_notes: false
          draft: false
          prerelease: false
